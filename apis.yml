      - Supply Chain
    humanURL: https://www.bunge.com/
    properties:
      - url: https://www.bunge.com/
        type: Documentation
    description: >-
      Bunge operates customer-facing portals for industrial and food-service
      customers to manage orders, contracts, shipment tracking, and account
      information for oilseed, grain, and oil product purchases. Access is
      typically negotiated through commercial relationships.

  - aid: bunge:bunge-farmer-portal
    name: Bunge Farmer Portal
    tags:
      - Farmer
      - Grain Origination
      - Contracts
    humanURL: https://www.bunge.com/
    properties:
      - url: https://www.bunge.com/
        type: Documentation
    description: >-
      Bunge operates digital tools for grain origination relationships with
      farmers, enabling contract management, pricing, scale-ticket access,
      and settlement information for delivered grain. Access is restricted
      to growers under a delivery contract.
