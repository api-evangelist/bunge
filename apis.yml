description: >-
  Bunge Global SA is a multinational agribusiness and food company connecting
  farmers to consumers by sourcing, processing, and supplying oilseed and grain
  products. Operates across grain origination, oilseed processing, refined and
  specialty oils, milling, sugarcane and biofuel production, and fertilizer
  sales. In 2025 Bunge completed its merger with Viterra to create a major
  global agricultural trading and processing platform.
